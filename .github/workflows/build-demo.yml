name: Build demo PDF

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-demo:
    name: Compile Typst demo
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Typst
        uses: typst-community/setup-typst@v5
        with:
          typst-version: 0.15.0

      - name: Install template fonts
        run: |
          mkdir -p ~/.local/share/fonts/c3_typst_template
          curl -fL -o ~/.local/share/fonts/c3_typst_template/Raleway.ttf \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/raleway/Raleway%5Bwght%5D.ttf'
          curl -fL -o ~/.local/share/fonts/c3_typst_template/Raleway-Italic.ttf \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/raleway/Raleway-Italic%5Bwght%5D.ttf'
          curl -fL -o ~/.local/share/fonts/c3_typst_template/Lato-Regular.ttf \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/lato/Lato-Regular.ttf'
          curl -fL -o ~/.local/share/fonts/c3_typst_template/Lato-Bold.ttf \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/lato/Lato-Bold.ttf'
          curl -fL -o ~/.local/share/fonts/c3_typst_template/Lato-Italic.ttf \
            'https://raw.githubusercontent.com/google/fonts/main/ofl/lato/Lato-Italic.ttf'
          fc-cache -f
          typst fonts | grep -E 'Lato|Raleway'

      - name: Compile demo deck
        run: typst compile c3_typst_template_example.typ c3_typst_template_example.pdf

      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: c3_typst_template_example
          path: c3_typst_template_example.pdf
          if-no-files-found: error
